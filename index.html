<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Login Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
    }
    #loginBtn {
      padding: 10px 20px;
      font-size: 16px;
      background: #69C9D0;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #userInfo {
      margin-top: 20px;
      text-align: center;
    }
    img {
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <h1>TikTok Login Demo</h1>
  <button id="loginBtn">Login with TikTok</button>

  <div id="userInfo" style="display:none;">
    <h2>User Info</h2>
    <p id="username"></p>
    <img id="avatar" width="100" height="100" alt="Profile Picture"/>
  </div>

  <script src="script.js"></script>
</body>
</html>
