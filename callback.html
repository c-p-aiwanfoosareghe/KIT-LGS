<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Callback</title>
</head>
<body>
  <h1>TikTok Login Callback</h1>
  <div id="userInfo"></div>

  <script>
    // Extract "code" from URL
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');

    if (code) {
      document.getElementById('userInfo').innerText = `Received auth code: ${code}\nYou can now exchange this code for an access token to fetch user.info.basic`;
    } else {
      document.getElementById('userInfo').innerText = 'No code received. Login failed or cancelled.';
    }
  </script>
</body>
</html>
